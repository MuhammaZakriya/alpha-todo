name: CI/CD with Docker Hub

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: muhammadzakria1/todo-backend
  FRONTEND_IMAGE: muhammadzakria1/todo-frontend

jobs:
  # Phase 1: Build, Test, and Push to Docker Hub
  ci-build-push:
    runs-on: ubuntu-latest
    
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "SHA: $(git rev-parse --short HEAD)"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Verify images pushed
        run: |
          echo "Backend: ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}"
          docker buildx imagetools inspect ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }} || echo "Backend not found"
          docker buildx imagetools inspect ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }} || echo "Frontend not found"

  # Phase 2: Deploy to Local Machine (Pull from Docker Hub)
  deploy-local:
    needs: ci-build-push
    runs-on: [self-hosted, local, laptop]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Get SHA from previous job
        run: |
          echo "Using SHA: ${{ needs.ci-build-push.outputs.sha_short }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull images with specific SHA
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:${{ needs.ci-build-push.outputs.sha_short }}
          docker pull ${{ env.FRONTEND_IMAGE }}:${{ needs.ci-build-push.outputs.sha_short }}

      - name: Tag as latest locally
        run: |
          docker tag ${{ env.BACKEND_IMAGE }}:${{ needs.ci-build-push.outputs.sha_short }} ${{ env.BACKEND_IMAGE }}:latest
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ needs.ci-build-push.outputs.sha_short }} ${{ env.FRONTEND_IMAGE }}:latest

      - name: Create docker-compose.prod.yml
        run: |
          cat > docker-compose.prod.yml << 'EOF'
          version: '3.8'
          services:
            mongo:
              image: mongo:6.0
              container_name: mongo
              restart: unless-stopped
              volumes:
                - mongo-data:/data/db
              networks:
                - todo-network

            backend:
              image: ${{ env.BACKEND_IMAGE }}:${{ needs.ci-build-push.outputs.sha_short }}
              container_name: todo-backend
              restart: unless-stopped
              ports:
                - "8000:8000"
              env_file:
                - ./backend/.env
              depends_on:
                - mongo
              networks:
                - todo-network

            frontend:
              image: ${{ env.FRONTEND_IMAGE }}:${{ needs.ci-build-push.outputs.sha_short }}
              container_name: todo-frontend
              restart: unless-stopped
              ports:
                - "5173:80"
              depends_on:
                - backend
              networks:
                - todo-network

          volumes:
            mongo-data:
              external: true

          networks:
            todo-network:
              external: true
          EOF

      - name: Deploy
        run: |
          docker compose -f docker-compose.prod.yml down || true
          docker compose -f docker-compose.prod.yml up -d

      - name: Verify deployment
        run: |
          sleep 10
          docker ps
          curl -fsS http://localhost:8000/docs1 || exit 1
          curl -fsS http://localhost:51731 || exit 1

      - name: Display deployed version
        run: |
          echo "========================================"
          echo "🚀 DEPLOYED VERSION: ${{ needs.ci-build-push.outputs.sha_short }}"
          echo "========================================"