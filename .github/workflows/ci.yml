name: CI

on:
  push:
  pull_request:

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Docker
        run: |
          docker --version
          docker compose version

      - name: Create network if missing
        run: |
          docker network inspect todo-network >/dev/null 2>&1 || \
          docker network create todo-network

      - name: Create volume if missing
        run: |
          docker volume inspect mongo-data >/dev/null 2>&1 || \
          docker volume create mongo-data

      - name: Build images
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for services to be ready
        run: sleep 12

      - name: Show running containers
        run: docker compose ps

      # Backend check (internal network)
      - name: Test backend service
        run: |
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS http://backend:8000/docs

      # Test full chain: backend → mongo → backend → response
      - name: Test backend→mongo connectivity
        run: |
          echo "Adding test task to backend..."
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS -X POST http://backend:8000/add \
            -H "Content-Type: application/json" \
            -d '{"title":"ci-test-task","done":false}'

          echo "Verifying task was stored in MongoDB..."
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS http://backend:8000/tasks | grep "ci-test-task"

          echo "✅ Backend→Mongo→Backend chain verified"

      - name: Test CORS + frontend→backend connectivity
        run: |
          echo "Testing CORS preflight and actual API call..."

          # Test 1: CORS preflight request (OPTIONS)
          echo "Checking CORS preflight..."
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS -X OPTIONS http://backend:8000/add \
            -H "Origin: http://localhost" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: Content-Type" \
            -v 2>&1 | grep -i "access-control-allow-origin" || echo "⚠️ CORS headers missing or different"

          # Test 2: Actual POST with Origin header (simulates browser)
          echo "Testing POST with Origin header..."
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS -X POST http://backend:8000/add \
            -H "Content-Type: application/json" \
            -H "Origin: http://localhost" \
            -d '{"title":"cors-test-task","done":false}' \
            -w "\nHTTP Code: %{http_code}\n" \
            -v 2>&1 | tee /tmp/cors_test.log

          # Test 3: Verify data reached MongoDB
          echo "Verifying data storage..."
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS http://backend:8000/tasks | grep "cors-test-task" && echo "✅ Data stored" || echo "❌ Data not found"

          # Show full response for debugging
          echo "Full response headers:"
          cat /tmp/cors_test.log | grep -i "access-control" || echo "No CORS headers in response"

      # Frontend check
      - name: Test frontend service
        run: |
          docker run --rm --network todo-network curlimages/curl:8.5.0 \
            -fsS http://frontend/

      # Run backend Python tests
      - name: Run backend tests
        run: |
          pip install -r backend/requirements.txt
          PYTHONPATH=./backend python -m pytest backend/tests/

      # Debug if something breaks
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose down